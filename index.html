<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATTLE PRO - EMERGENCY FIX</title>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #ui-layer { position: fixed; width: 100%; height: 100%; z-index: 100; pointer-events: none; color: white; }
        .btn { pointer-events: auto; background: #f1c40f; color: #000; border: none; padding: 15px; font-weight: bold; border-radius: 10px; cursor: pointer; }
        #lobby { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #controls { position: absolute; bottom: 20px; width: 100%; display: none; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        .joy-area { width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .stick { width: 40px; height: 40px; background: white; border-radius: 50%; }
        #stats { position: absolute; top: 10px; right: 10px; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="stats">
        <div style="background:rgba(0,0,0,0.7); padding:5px 10px; border:1px solid #f1c40f;">💎 <span id="gems">1000</span></div>
    </div>

    <div id="lobby">
        <h1 style="color:#f1c40f; text-shadow: 0 0 10px #f1c40f;">BATTLE PRO MAX</h1>
        <p>إذا كنت ترى هذا، فالكود الجديد يعمل!</p>
        <button class="btn" style="font-size: 24px; padding: 20px 50px;" onclick="start()">ابدأ اللعب (START)</button>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn" style="background:#00f3ff" onclick="alert('تم الشحن! اكتب MOHAMMAD')">شحن 🎁</button>
            <button class="btn" style="background:#ff4757" onclick="changeColor()">تغيير السكن 🧥</button>
        </div>
    </div>

    <div id="controls">
        <div class="joy-area" id="joy"><div class="stick" id="stk"></div></div>
        <div class="btn" style="width:80px; height:80px; border-radius:50%; font-size:30px; display:flex; align-items:center; justify-content:center;" onclick="alert('إطلاق نار!')">🔫</div>
    </div>
</div>

<script>
    let scene, camera, renderer, player, inGame = false;
    let moveDir = { x: 0, z: 0 };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // إضاءة قوية جداً
        const light1 = new THREE.AmbientLight(0xffffff, 1); scene.add(light1);
        const light2 = new THREE.PointLight(0xffffff, 2); light2.position.set(5, 5, 5); scene.add(light2);

        // اللاعب (سكن نيون)
        const geo = new THREE.CapsuleGeometry(0.5, 1, 4, 8);
        const mat = new THREE.MeshPhongMaterial({ color: 0x00f3ff });
        player = new THREE.Mesh(geo, mat);
        player.position.y = 1;
        scene.add(player);

        // أرضية و 300 غرض
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshPhongMaterial({color: 0x111122}));
        ground.rotation.x = -Math.PI / 2; scene.add(ground);

        for(let i=0; i<300; i++) {
            const box = new THREE.Mesh(new THREE.BoxGeometry(1.5, Math.random()*4, 1.5), new THREE.MeshPhongMaterial({color: Math.random()*0xffffff}));
            box.position.set(Math.random()*400-200, 0, Math.random()*400-200);
            scene.add(box);
        }

        camera.position.set(0, 5, 10);
        animate();
    }

    function start() {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('controls').style.display = 'flex';
        inGame = true;
    }

    function changeColor() {
        player.material.color.setHex(Math.random() * 0xffffff);
    }

    // حركة الجويستيك
    const joy = document.getElementById('joy');
    const stk = document.getElementById('stk');
    joy.addEventListener('touchmove', (e) => {
        const t = e.touches[0]; const r = joy.getBoundingClientRect();
        const dx = t.clientX - (r.left + 50), dz = t.clientY - (r.top + 50);
        const d = Math.min(Math.sqrt(dx*dx + dz*dz), 40);
        const a = Math.atan2(dz, dx);
        stk.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
        moveDir = { x: Math.cos(a)*(d/40), z: Math.sin(a)*(d/40) };
    });
    joy.addEventListener('touchend', () => { stk.style.transform = 'none'; moveDir = {x:0, z:0}; });

    function animate() {
        requestAnimationFrame(animate);
        if(inGame) {
            player.position.x += moveDir.x * 0.4;
            player.position.z += moveDir.z * 0.4;
            camera.position.lerp(new THREE.Vector3(player.position.x, 6, player.position.z + 10), 0.1);
            camera.lookAt(player.position);
        } else {
            player.rotation.y += 0.02;
            camera.lookAt(player.position);
        }
        renderer.render(scene, camera);
    }

    window.onload = init;
</script>
</body>
</html>
