<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATTLE PRO ULTRA</title>
    <style>
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ff; --gold: #f1c40f; }
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Orbitron', sans-serif; color: white; touch-action: none; }
        
        /* اللوبي الأسطوري */
        #lobby {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }

        /* تأثير الشخصية المتطورة */
        .char-3d {
            width: 100px; height: 150px; background: linear-gradient(var(--neon-blue), #0057ff);
            border-radius: 10px; position: relative; transform-style: preserve-3d;
            box-shadow: 0 0 50px var(--neon-blue); animation: float 3s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0) rotateY(0deg); } 50% { transform: translateY(-20px) rotateY(180deg); } }

        /* الأزرار الاحترافية */
        .ui-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 12px 25px; border-radius: 5px;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        #start-btn {
            margin-top: 50px; padding: 20px 80px; font-size: 24px;
            background: var(--neon-blue); color: #000; font-weight: bold;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); border: none;
        }

        /* واجهة اللعب */
        #game-ui { display: none; }
        #joy-bg { position: fixed; left: 50px; bottom: 50px; width: 130px; height: 130px; background: rgba(255,255,255,0.05); border: 2px solid var(--neon-blue); border-radius: 50%; }
        #joy-thumb { position: absolute; left: 40px; top: 40px; width: 50px; height: 50px; background: var(--neon-blue); border-radius: 50%; box-shadow: 0 0 20px var(--neon-blue); }
        #fire-btn { position: fixed; right: 50px; bottom: 50px; width: 100px; height: 100px; background: var(--neon-pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 4px solid #fff; box-shadow: 0 0 30px var(--neon-pink); }
        
        .health-container { position: fixed; top: 20px; width: 80%; left: 10%; height: 10px; background: #222; border-radius: 5px; }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #ff5555); border-radius: 5px; transition: 0.3s; }
    </style>
</head>
<body>

<div id="lobby">
    <div style="position: absolute; top: 30px; right: 30px; color: var(--gold); font-size: 24px;">💎 <span id="gems">500</span></div>
    <div class="char-3d"></div>
    <h1 style="letter-spacing: 10px; margin: 20px 0;">BATTLE PRO</h1>
    <p style="color: #666;">نسخة المطور - v2.0</p>
    <button id="start-btn" onclick="start()">START GAME</button>
</div>

<div id="game-ui">
    <div class="health-container"><div id="hp-bar"></div></div>
    <div id="joy-bg"><div id="joy-thumb"></div></div>
    <div id="fire-btn">🔫</div>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let playing = false;
    let player = { x: 1000, y: 1000, hp: 100 };
    let enemies = [];
    let bullets = [];
    let joy = { x: 0, y: 0, active: false };

    function start() {
        document.getElementById("lobby").style.display = "none";
        document.getElementById("game-ui").style.display = "block";
        playing = true;
        for(let i=0; i<20; i++) enemies.push({x: Math.random()*3000, y: Math.random()*3000, id: Math.random()});
        loop();
    }

    // نظام اللمس المتطور
    window.addEventListener("touchstart", (e) => {
        if(e.touches[0].clientX < window.innerWidth/2) joy.active = true;
    });
    window.addEventListener("touchmove", (e) => {
        if(!joy.active) return;
        let t = e.touches[0];
        let r = document.getElementById("joy-bg").getBoundingClientRect();
        let dx = t.clientX - (r.left + 65);
        let dy = t.clientY - (r.top + 65);
        let d = Math.sqrt(dx*dx + dy*dy);
        if(d > 50) { dx *= 50/d; dy *= 50/d; }
        joy.x = dx/8; joy.y = dy/8;
        document.getElementById("joy-thumb").style.transform = `translate(${dx}px, ${dy}px)`;
    });
    window.addEventListener("touchend", () => { joy.active = false; joy.x = 0; joy.y = 0; document.getElementById("joy-thumb").style.transform = `translate(0,0)`; });

    document.getElementById("fire-btn").addEventListener("touchstart", (e) => {
        e.preventDefault();
        bullets.push({x: player.x, y: player.y, vx: joy.x*5 || 15, vy: joy.y*5 || 0});
        // اهتزاز بسيط عند الإطلاق
        window.navigator.vibrate?.(20);
    });

    function loop() {
        if(!playing) return;
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        player.x += joy.x; player.y += joy.y;

        // الخلفية (شبكة نيون)
        ctx.fillStyle = "#050505"; ctx.fillRect(0,0,canvas.width, canvas.height);
        
        ctx.save();
        ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);

        // رسم الأرضية (Grid)
        ctx.strokeStyle = "#111";
        for(let i=0; i<3000; i+=100) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 3000); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(3000, i); ctx.stroke();
        }

        // الأعداء (شكل هجومي)
        enemies.forEach((en, index) => {
            let d = Math.hypot(player.x - en.x, player.y - en.y);
            en.x += (player.x - en.x)/d * 2.5;
            en.y += (player.y - en.y)/d * 2.5;
            
            ctx.fillStyle = "#ff0044";
            ctx.shadowBlur = 15; ctx.shadowColor = "#ff0044";
            ctx.fillRect(en.x-15, en.y-15, 30, 30);
            
            if(d < 35) {
                player.hp -= 0.5;
                document.getElementById("hp-bar").style.width = player.hp + "%";
            }

            // اصطدام الرصاص بالأعداء
            bullets.forEach((b, bi) => {
                if(Math.hypot(b.x - en.x, b.y - en.y) < 30) {
                    enemies.splice(index, 1);
                    bullets.splice(bi, 1);
                    enemies.push({x: Math.random()*3000, y: Math.random()*3000}); // وحش جديد
                }
            });
        });

        // الرصاص (ليزر)
        bullets.forEach(b => {
            b.x += b.vx; b.y += b.vy;
            ctx.fillStyle = var(--neon-blue);
            ctx.shadowBlur = 10; ctx.fillRect(b.x, b.y, 20, 4);
        });

        // اللاعب (روبوت نيون)
        ctx.fillStyle = var(--neon-blue);
        ctx.shadowBlur = 20; ctx.shadowColor = var(--neon-blue);
        ctx.fillRect(player.x-20, player.y-20, 40, 40);
        ctx.strokeStyle = "#fff"; ctx.strokeRect(player.x-20, player.y-20, 40, 40);

        ctx.restore();
        if(player.hp <= 0) location.reload();
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
