<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATTLE PRO MAX - THE VAULT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --neon: #00f3ff; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; }
        
        /* واجهة اللوبي */
        #lobby-ui { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle at center, transparent, #000); z-index: 10; display: flex; flex-direction: column; justify-content: space-between; }
        .top-bar { display: flex; justify-content: flex-end; gap: 15px; padding: 15px; }
        .currency { background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold); font-size: 14px; color: var(--gold); }
        
        /* القائمة الجانبية (الخزنة والمتجر) */
        .side-menu { position: absolute; left: 15px; top: 100px; display: flex; flex-direction: column; gap: 10px; }
        .btn-side { width: 65px; height: 65px; background: rgba(0,0,0,0.7); border: 2px solid white; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-direction: column; font-size: 10px; cursor: pointer; }

        /* نافذة الخزنة (Vault) */
        #vault-window { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; height: 80%; background: rgba(10,10,25,0.95); border: 2px solid var(--neon); z-index: 100; border-radius: 15px; padding: 20px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .skin-card { background: #1a1a2e; border: 1px solid #333; padding: 10px; border-radius: 8px; text-align: center; }
        .skin-card img { width: 100%; border-radius: 5px; }

        /* أزرار الرقصات أثناء اللعب */
        #emote-menu { position: fixed; right: 10px; top: 100px; display: none; flex-direction: column; gap: 5px; z-index: 30; }
        .emote-btn { width: 50px; height: 50px; background: rgba(0,0,0,0.5); border: 1px solid var(--gold); border-radius: 50%; font-size: 20px; pointer-events: auto; }

        /* التحكم */
        #game-ui { display: none; position: fixed; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        #joystick { position: absolute; left: 40px; bottom: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid white; pointer-events: auto; }
        #stick { position: absolute; left: 35px; top: 35px; width: 50px; height: 50px; background: white; border-radius: 50%; }
        #fire-btn { position: absolute; right: 40px; bottom: 80px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border: 4px solid white; border-radius: 50%; pointer-events: auto; display: flex; align-items: center; justify-content: center; font-size: 40px; }

        .start-btn { width: 260px; height: 75px; background: var(--gold); color: black; font-size: 28px; font-weight: bold; border: none; margin: 0 auto 30px; cursor: pointer; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); }
    </style>
</head>
<body>

<div id="lobby-ui">
    <div class="top-bar">
        <div class="currency">💎 <span id="gems">9999</span></div>
        <div class="currency">💰 <span id="coins">50000</span></div>
    </div>
    <div class="side-menu">
        <div class="btn-side" onclick="toggleVault()">📦<br>الخزنة</div>
        <div class="btn-side" onclick="alert('المتجر مليء بالسكنات!')">🛒<br>المتجر</div>
    </div>
    <button class="start-btn" onclick="startGame()">START</button>
</div>

<div id="vault-window">
    <h2 style="color:var(--neon)">خزنة الملابس والرقصات</h2>
    <div class="grid">
        <div class="skin-card" onclick="changeSkin(0xff0000)">🔴<br>سكن أحمر</div>
        <div class="skin-card" onclick="changeSkin(0x00f3ff)">🔵<br>سكن نيون</div>
        <div class="skin-card" onclick="changeSkin(0xf1c40f)">🟡<br>سكن ذهبي</div>
        <div class="skin-card" onclick="playEmote('dance')">🕺<br>رقصة 1</div>
        <div class="skin-card" onclick="playEmote('jump')">🦘<br>قفزة</div>
    </div>
    <button onclick="toggleVault()" style="margin-top:20px; width:100%; padding:10px; background:var(--gold); border:none; font-weight:bold;">إغلاق</button>
</div>

<div id="game-ui">
    <div id="emote-menu">
        <button class="emote-btn" onclick="playEmote('dance')">🕺</button>
        <button class="emote-btn" onclick="playEmote('jump')">🦘</button>
    </div>
    <div id="joystick"><div id="stick"></div></div>
    <div id="fire-btn">🔫</div>
</div>

<script>
    let inGame = false;
    let moveDir = { x: 0, z: 0 };
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 5);
    scene.add(light);

    // الأرضية
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshPhongMaterial({color: 0x111122}));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // إضافة 300 غرض في الخريطة
    for(let i=0; i<300; i++){
        let x = Math.random()*800-400;
        let z = Math.random()*800-400;
        let h = Math.random()*5 + 1;
        const obj = new THREE.Mesh(new THREE.BoxGeometry(2, h, 2), new THREE.MeshPhongMaterial({color: Math.random()*0xffffff}));
        obj.position.set(x, h/2, z);
        scene.add(obj);
    }

    // الشخصية (سكن مطور)
    const playerGroup = new THREE.Group();
    const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.2, 4, 12), new THREE.MeshPhongMaterial({color: 0x00f3ff}));
    body.position.y = 1.1;
    playerGroup.add(body);
    scene.add(playerGroup);

    camera.position.set(0, 5, 10);

    function toggleVault() {
        let v = document.getElementById('vault-window');
        v.style.display = v.style.display === 'block' ? 'none' : 'block';
    }

    function changeSkin(color) {
        body.material.color.setHex(color);
        alert("تم تغيير السكن بنجاح!");
    }

    function playEmote(type) {
        if(type === 'dance') playerGroup.rotation.y += Math.PI * 2;
        if(type === 'jump') {
            let startY = playerGroup.position.y;
            playerGroup.position.y += 2;
            setTimeout(() => playerGroup.position.y = startY, 300);
        }
    }

    function startGame() {
        document.getElementById('lobby-ui').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('emote-menu').style.display = 'flex';
        inGame = true;
    }

    // نظام الحركة المطور
    const joystick = document.getElementById('joystick');
    const stick = document.getElementById('stick');
    joystick.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const t = e.touches[0];
        const r = joystick.getBoundingClientRect();
        const dx = t.clientX - (r.left + 60);
        const dz = t.clientY - (r.top + 60);
        const d = Math.min(Math.sqrt(dx*dx + dz*dz), 40);
        const angle = Math.atan2(dz, dx);
        stick.style.transform = `translate(${Math.cos(angle)*d}px, ${Math.sin(angle)*d}px)`;
        moveDir.x = Math.cos(angle) * (d/40);
        moveDir.z = Math.sin(angle) * (d/40);
    });
    joystick.addEventListener('touchend', () => {
        stick.style.transform = `translate(0,0)`;
        moveDir = { x: 0, z: 0 };
    });

    function animate() {
        requestAnimationFrame(animate);
        if (inGame) {
            playerGroup.position.x += moveDir.x * 0.4;
            playerGroup.position.z += moveDir.z * 0.4;
            camera.position.lerp(new THREE.Vector3(playerGroup.position.x, 6, playerGroup.position.z + 12), 0.1);
            camera.lookAt(playerGroup.position);
        } else {
            playerGroup.rotation.y += 0.01;
            camera.lookAt(playerGroup.position);
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
