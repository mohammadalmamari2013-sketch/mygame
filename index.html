<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATTLE PRO - LUCK ROYALE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --blue: #3498db; }
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; color: white; }
        
        /* واجهة اللوبي */
        #lobby-ui { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle, transparent, rgba(0,0,0,0.9)); z-index: 10; display: flex; flex-direction: column; justify-content: space-between; }
        .top-bar { display: flex; justify-content: flex-end; gap: 15px; padding: 15px; }
        .currency { background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold); font-size: 14px; }
        
        /* القائمة الجانبية */
        .side-menu { position: absolute; left: 15px; top: 100px; display: flex; flex-direction: column; gap: 10px; }
        .btn-side { width: 60px; height: 60px; background: rgba(0,0,0,0.6); border: 2px solid white; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-direction: column; font-size: 10px; cursor: pointer; }

        /* نافذة الحرق (Luck Royale) */
        #event-window { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 70%; background: rgba(20, 20, 40, 0.95); border: 3px solid var(--gold); z-index: 100; border-radius: 15px; text-align: center; padding: 20px; }
        .spin-btn { background: var(--gold); color: black; padding: 10px 30px; border: none; font-weight: bold; border-radius: 5px; margin-top: 20px; font-size: 18px; }

        /* واجهة الجيم */
        #game-ui { display: none; position: fixed; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        #fire-btn { position: absolute; right: 40px; bottom: 80px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border: 4px solid white; border-radius: 50%; pointer-events: auto; display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: 0 0 20px rgba(255,255,255,0.5); }
        #joystick { position: absolute; left: 40px; bottom: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid white; pointer-events: auto; }
        #stick { position: absolute; left: 35px; top: 35px; width: 50px; height: 50px; background: white; border-radius: 50%; }

        .start-btn { width: 250px; height: 70px; background: var(--gold); color: black; font-size: 28px; font-weight: bold; border: none; margin: 0 auto 30px; cursor: pointer; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); }
    </style>
</head>
<body>

<div id="lobby-ui">
    <div class="top-bar">
        <div class="currency">💰 <span id="coins">51282</span></div>
        <div class="currency">💎 <span id="gems">101</span></div>
    </div>
    
    <div class="side-menu">
        <div class="btn-side" onclick="openEvent('diamond')">💎<br>حرق سكن</div>
        <div class="btn-side" onclick="openEvent('gold')">💰<br>حرق عملات</div>
        <div class="btn-side" onclick="alert('المتجر قريباً!')">🛒<br>المتجر</div>
    </div>

    <button class="start-btn" onclick="startGame()">START</button>
</div>

<div id="event-window">
    <h2 id="event-title">حدث الحرق الأسطوري</h2>
    <div id="skin-preview" style="height: 150px; background: #333; margin: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 50px;">👤</div>
    <p>السعر: <span id="spin-price">25</span></p>
    <button class="spin-btn" onclick="spinNow()">حرق الآن 🔥</button>
    <button onclick="closeEvent()" style="background:none; border:none; color:white; margin-top:20px; display:block; width:100%">إغلاق</button>
</div>

<div id="game-ui">
    <div id="joystick"><div id="stick"></div></div>
    <div id="fire-btn">🔫</div>
</div>

<script>
    let coins = 51282;
    let gems = 101;
    let inGame = false;
    let currentEventType = '';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // إضاءة
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    // اللاعب (سكن 3D مطور)
    const playerGroup = new THREE.Group();
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.2), new THREE.MeshPhongMaterial({color: 0x222222}));
    body.position.y = 0.6;
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshPhongMaterial({color: 0xffdbac}));
    head.position.y = 1.4;
    playerGroup.add(body); playerGroup.add(head);
    scene.add(playerGroup);

    // أرضية وخريطة
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshPhongMaterial({color: 0x348C31}));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    camera.position.set(0, 3, 7);

    // وظائف الحرق
    function openEvent(type) {
        currentEventType = type;
        document.getElementById('event-window').style.display = 'block';
        document.getElementById('event-title').innerText = type === 'diamond' ? 'حرق السكن بالجواهر' : 'حرق السكن بالعملات';
        document.getElementById('spin-price').innerText = type === 'diamond' ? '25 جوهرة' : '3000 عملة';
    }

    function closeEvent() { document.getElementById('event-window').style.display = 'none'; }

    function spinNow() {
        if (currentEventType === 'diamond') {
            if (gems >= 25) {
                gems -= 25;
                alert("مبروك! حصلت على سكن الروبوت الأزرق 🤖");
                body.material.color.setHex(0x0000ff);
            } else { alert("جواهرك لا تكفي!"); }
        } else {
            if (coins >= 3000) {
                coins -= 3000;
                alert("مبروك! حصلت على سكن الجندي الأحمر 🧥");
                body.material.color.setHex(0xff0000);
            } else { alert("عملاتك لا تكفي!"); }
        }
        document.getElementById('gems').innerText = gems;
        document.getElementById('coins').innerText = coins;
        closeEvent();
    }

    function startGame() {
        document.getElementById('lobby-ui').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        inGame = true;
    }

    // التحكم
    let moveDir = { x: 0, z: 0 };
    const joystick = document.getElementById('joystick');
    const stick = document.getElementById('stick');

    joystick.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const t = e.touches[0];
        const r = joystick.getBoundingClientRect();
        const dx = t.clientX - (r.left + 60);
        const dz = t.clientY - (r.top + 60);
        const d = Math.min(Math.sqrt(dx*dx + dz*dz), 40);
        const angle = Math.atan2(dz, dx);
        stick.style.transform = `translate(${Math.cos(angle)*d}px, ${Math.sin(angle)*d}px)`;
        moveDir.x = Math.cos(angle) * (d/40);
        moveDir.z = Math.sin(angle) * (d/40);
    });

    joystick.addEventListener('touchend', () => {
        stick.style.transform = `translate(0,0)`;
        moveDir = { x: 0, z: 0 };
    });

    function animate() {
        requestAnimationFrame(animate);
        if (inGame) {
            playerGroup.position.x += moveDir.x * 0.2;
            playerGroup.position.z += moveDir.z * 0.2;
            camera.position.set(playerGroup.position.x, 4, playerGroup.position.z + 8);
            camera.lookAt(playerGroup.position);
        } else {
            playerGroup.rotation.y += 0.01;
            camera.lookAt(playerGroup.position);
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
