<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATTLE PRO MAX - V3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        
        /* واجهة اللوبي */
        #lobby-ui {
            position: fixed; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,50,0) 0%, rgba(0,0,0,0.8) 100%);
            display: flex; flex-direction: column; justify-content: space-between; z-index: 10;
        }
        .currency { display: flex; gap: 15px; padding: 20px; justify-content: flex-end; }
        .item { background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 20px; border: 1px solid #f1c40f; color: #fff; font-weight: bold; }
        .side-menu { position: absolute; left: 20px; top: 100px; display: flex; flex-direction: column; gap: 12px; }
        .side-btn { width: 55px; height: 55px; background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 12px; color: white; font-size: 10px; display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; }
        .start-btn { 
            width: 280px; height: 80px; background: #f1c40f; color: #000; font-size: 32px; font-weight: bold; 
            border: none; margin: 0 auto 40px; cursor: pointer; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            box-shadow: 0 0 30px #f1c40f;
        }

        /* واجهة الجيم */
        #game-ui { display: none; position: fixed; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        #joystick { position: absolute; left: 50px; bottom: 50px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid #fff; pointer-events: auto; }
        #stick { position: absolute; left: 35px; top: 35px; width: 50px; height: 50px; background: #fff; border-radius: 50%; }
        #fire-btn { position: absolute; right: 50px; bottom: 70px; width: 90px; height: 90px; background: rgba(255,0,0,0.6); border-radius: 50%; border: 4px solid #fff; pointer-events: auto; display: flex; align-items: center; justify-content: center; font-size: 40px; color: white; }
    </style>
</head>
<body>

<div id="lobby-ui">
    <div class="currency"><div class="item">💰 51,282</div><div class="item">💎 101</div></div>
    <div class="side-menu">
        <div class="side-btn" onclick="emote('dance')">🕺<br>رقصة</div>
        <div class="side-btn" onclick="emote('jump')">🦘<br>قفزة</div>
    </div>
    <button class="start-btn" onclick="startGame()">START / ابدأ</button>
</div>

<div id="game-ui">
    <div id="joystick"><div id="stick"></div></div>
    <div id="fire-btn">🔫</div>
</div>

<script>
    let inGame = false;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb); // سماء زرقاء
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // الإضاءة
    const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
    scene.add(light);

    // الخريطة (الأرضية)
    const floorGeo = new THREE.PlaneGeometry(200, 200);
    const floorMat = new THREE.MeshPhongMaterial({ color: 0x348C31 }); // عشب أخضر
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // إضافة 200 غرض في الخريطة
    for (let i = 0; i < 200; i++) {
        let type = Math.random();
        let x = Math.random() * 180 - 90;
        let z = Math.random() * 180 - 90;

        if (type < 0.4) { // أشجار
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1), new THREE.MeshPhongMaterial({color: 0x8B4513}));
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(1, 2, 8), new THREE.MeshPhongMaterial({color: 0x006400}));
            trunk.position.set(x, 0.5, z);
            leaves.position.set(x, 2, z);
            scene.add(trunk); scene.add(leaves);
        } else if (type < 0.7) { // صناديق لوت
            const box = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshPhongMaterial({color: 0xffd700}));
            box.position.set(x, 0.5, z);
            scene.add(box);
        } else { // صخور/مباني صغيرة
            const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(Math.random() + 0.5), new THREE.MeshPhongMaterial({color: 0x808080}));
            rock.position.set(x, 0.5, z);
            scene.add(rock);
        }
    }

    // الشخصية 3D
    const playerGroup = new THREE.Group();
    const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1, 4, 8), new THREE.MeshPhongMaterial({color: 0x222222}));
    body.position.y = 1;
    playerGroup.add(body);
    scene.add(playerGroup);

    camera.position.set(0, 5, 10);
    camera.lookAt(playerGroup.position);

    // نظام الحركة
    let moveDir = { x: 0, z: 0 };
    function startGame() {
        document.getElementById('lobby-ui').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        inGame = true;
    }

    // رقصات اللوبي
    function emote(type) {
        if(type === 'dance') playerGroup.rotation.y += Math.PI * 2;
        if(type === 'jump') playerGroup.position.y = 2;
        setTimeout(() => playerGroup.position.y = 0, 500);
    }

    // التحكم بالجويستيك
    const joystick = document.getElementById('joystick');
    const stick = document.getElementById('stick');
    joystick.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const rect = joystick.getBoundingClientRect();
        const dx = touch.clientX - (rect.left + 60);
        const dz = touch.clientY - (rect.top + 60);
        const dist = Math.min(Math.sqrt(dx*dx + dz*dz), 40);
        const angle = Math.atan2(dz, dx);
        
        stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        moveDir.x = Math.cos(angle) * (dist/40);
        moveDir.z = Math.sin(angle) * (dist/40);
    });
    joystick.addEventListener('touchend', () => {
        stick.style.transform = `translate(0,0)`;
        moveDir = { x: 0, z: 0 };
    });

    function animate() {
        requestAnimationFrame(animate);
        if (inGame) {
            playerGroup.position.x += moveDir.x * 0.2;
            playerGroup.position.z += moveDir.z * 0.2;
            camera.position.set(playerGroup.position.x, 5, playerGroup.position.z + 10);
            camera.lookAt(playerGroup.position);
        } else {
            playerGroup.rotation.y += 0.01; // دوران خفيف في اللوبي
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
