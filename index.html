<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATTLE PRO MAX - MOBILE</title>
    <style>
        :root { --gold: #f1c40f; --blue: #3498db; --red: #e74c3c; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; color: white; touch-action: none; }
        
        /* شاشة اللوبي */
        #lobby {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }

        /* الشخصية 3D في اللوبي */
        .preview-char {
            width: 80px; height: 120px; background: var(--blue);
            border: 3px solid #fff; box-shadow: 0 0 30px var(--blue);
            animation: rotateChar 3s infinite linear; margin-bottom: 30px;
        }
        @keyframes rotateChar {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* القائمة الجانبية */
        .side-menu { position: absolute; right: 10px; top: 20%; display: flex; flex-direction: column; gap: 10px; }
        .menu-btn { background: rgba(0,0,0,0.7); border: 2px solid var(--gold); padding: 12px; border-radius: 10px; font-size: 14px; color: #fff; text-align: center; }

        /* عجلة الحظ */
        #wheel-container {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 200; text-align: center;
        }
        #wheel {
            width: 260px; height: 260px; border-radius: 50%; border: 8px solid var(--gold);
            background: conic-gradient(#ff1f1f 0deg 60deg, #1f75ff 60deg 120deg, #1fff57 120deg 180deg, #f3ff1f 180deg 240deg, #ff1ff3 240deg 300deg, #1ffff3 300deg 360deg);
            transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1);
        }

        #start-btn {
            background: var(--gold); color: #000; padding: 15px 50px;
            font-size: 22px; border: none; border-radius: 50px; font-weight: bold;
            box-shadow: 0 0 20px var(--gold); cursor: pointer;
        }

        /* واجهة اللعبة */
        #game-ui { display: none; }
        #joy-bg { position: fixed; left: 40px; bottom: 40px; width: 110px; height: 110px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); }
        #joy-thumb { position: absolute; left: 30px; top: 30px; width: 50px; height: 50px; background: #fff; border-radius: 50%; }
        #fire-btn { position: fixed; right: 40px; bottom: 50px; width: 90px; height: 90px; background: var(--red); border-radius: 50%; border: 5px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 40px; }

        #hp-bar { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 200px; height: 15px; background: #333; border: 2px solid #fff; }
        #hp-fill { width: 100%; height: 100%; background: var(--red); transition: 0.2s; }
    </style>
</head>
<body>

<div id="lobby">
    <div style="position: absolute; top: 20px; left: 20px; font-size: 20px;">💎 جواهر: <span id="gemCount">100</span></div>
    
    <div class="side-menu">
        <div class="menu-btn" onclick="showWheel()">🎡 عجلة الحظ</div>
        <div class="menu-btn" onclick="alert('المتجر يفتح قريباً!')">🛒 المتجر</div>
    </div>

    <div class="preview-char"></div>
    <h1 style="margin-bottom: 40px; text-shadow: 0 0 10px #fff;">BATTLE PRO</h1>
    <button id="start-btn" onclick="initGame()">ابدأ اللعب 🔥</button>
</div>

<div id="wheel-container">
    <div id="wheel"></div>
    <button class="menu-btn" style="margin-top:20px; width:100%" onclick="spinWheel()">اضغط للتدوير! 🌀</button>
</div>

<div id="game-ui">
    <div id="hp-bar"><div id="hp-fill"></div></div>
    <div id="joy-bg"><div id="joy-thumb"></div></div>
    <div id="fire-btn">🔫</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    let gameState = "LOBBY";
    let player = { x: 1000, y: 1000, hp: 100, gems: 100 };
    let enemies = [];
    let bullets = [];
    let move = { x: 0, y: 0, active: false };

    // تدوير عجلة الحظ
    function showWheel() { document.getElementById("wheel-container").style.display = "block"; }
    function spinWheel() {
        const wheel = document.getElementById("wheel");
        const randDeg = Math.floor(Math.random() * 3000) + 720;
        wheel.style.transform = `rotate(${randDeg}deg)`;
        setTimeout(() => {
            player.gems += 50;
            document.getElementById("gemCount").innerText = player.gems;
            alert("مبروك! ربحت 50 جوهرة 💎");
            document.getElementById("wheel-container").style.display = "none";
        }, 3200);
    }

    function initGame() {
        document.getElementById("lobby").style.display = "none";
        document.getElementById("game-ui").style.display = "block";
        gameState = "PLAYING";
        for(let i=0; i<15; i++) enemies.push({x: Math.random()*2000, y: Math.random()*2000});
        update();
    }

    // نظام تحكم الجوال (الجويستيك)
    window.addEventListener("touchstart", (e) => {
        if(e.touches[0].clientX < window.innerWidth/2) move.active = true;
    });

    window.addEventListener("touchmove", (e) => {
        if(!move.active) return;
        const t = e.touches[0];
        const rect = document.getElementById("joy-bg").getBoundingClientRect();
        let dx = t.clientX - (rect.left + 55);
        let dy = t.clientY - (rect.top + 55);
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist > 40) { dx *= 40/dist; dy *= 40/dist; }
        move.x = dx / 8;
        move.y = dy / 8;
        document.getElementById("joy-thumb").style.transform = `translate(${dx}px, ${dy}px)`;
    });

    window.addEventListener("touchend", () => {
        move.active = false; move.x = 0; move.y = 0;
        document.getElementById("joy-thumb").style.transform = `translate(0,0)`;
    });

    // زر الإطلاق
    document.getElementById("fire-btn").addEventListener("touchstart", (e) => {
        e.preventDefault();
        bullets.push({x: player.x, y: player.y, vx: move.x*5 || 10, vy: move.y*5 || 0});
    });

    function update() {
        if(gameState !== "PLAYING") return;
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        player.x += move.x;
        player.y += move.y;

        ctx.fillStyle = "#111";
        ctx.fillRect(0,0,canvas.width, canvas.height);

        ctx.save();
        ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);

        // رسم اللاعب
        ctx.fillStyle = "#3498db";
        ctx.fillRect(player.x-20, player.y-20, 40, 40);

        // الأعداء
        enemies.forEach(en => {
            const d = Math.hypot(player.x - en.x, player.y - en.y);
            en.x += (player.x - en.x)/d * 2;
            en.y += (player.y - en.y)/d * 2;
            ctx.fillStyle = "red"; ctx.fillRect(en.x-15, en.y-15, 30, 30);
            if(d < 30) { 
                player.hp -= 0.5; 
                document.getElementById("hp-fill").style.width = player.hp + "%";
            }
        });

        // الرصاص
        bullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            ctx.fillStyle = "yellow"; ctx.fillRect(b.x, b.y, 8, 8);
        });

        ctx.restore();

        if(player.hp <= 0) { alert("Game Over!"); location.reload(); }
        requestAnimationFrame(update);
    }
</script>
</body>
</html>
